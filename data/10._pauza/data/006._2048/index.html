<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Přístupná 2048</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .score-container {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }

        /* Herní pole */
        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background-color: #bbada0;
            padding: 10px;
            border-radius: 6px;
            border: 4px solid #888;
        }

        /* Focus stav pro tabulátor */
        #game-board:focus {
            outline: 5px solid #0056b3;
            outline-offset: 5px;
        }

        .tile {
            width: 80px;
            height: 80px;
            background-color: #cdc1b4;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 3px;
            color: #776e65;
        }

        /* Barvy pro různé hodnoty - vysoký kontrast */
        .tile[data-value="2"] { background: #eee4da; color: #776e65; }
        .tile[data-value="4"] { background: #ede0c8; color: #776e65; }
        .tile[data-value="8"] { background: #f2b179; color: white; }
        .tile[data-value="16"] { background: #f59563; color: white; }
        .tile[data-value="32"] { background: #f67c5f; color: white; }
        .tile[data-value="64"] { background: #f65e3b; color: white; }
        .tile[data-value="128"] { background: #edcf72; color: #776e65; }
        .tile[data-value="256"] { background: #edcc61; color: #776e65; }
        .tile[data-value="512"] { background: #edc850; color: white; }
        .tile[data-value="1024"] { background: #edc53f; color: white; }
        .tile[data-value="2048"] { background: #333; color: #ffcc00; border: 2px solid gold; }

        .instructions {
            margin-top: 20px;
            max-width: 400px;
            text-align: center;
            line-height: 1.4;
        }

        /* Skryté hlášení pro čtečku */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <div class="score-container">Skóre: <span id="score">0</span></div>

    <div id="game-board" 
         tabindex="0" 
         role="application" 
         aria-label="Herní pole 2048. Použijte šipky k pohybu dlaždic.">
        </div>

    <div id="announcer" class="sr-only" aria-live="assertive"></div>

    <div class="instructions">
        <p><strong>Jak hrát:</strong> Tabulátorem vstupte do pole. Šipkami posouvejte čísla. Dalším Tabulátorem odejdete pryč.</p>
        <button onclick="setupGame()">Nová hra</button>
    </div>

    <script>
        let board = [];
        let score = 0;
        const size = 4;
        const boardDiv = document.getElementById('game-board');
        const scoreSpan = document.getElementById('score');
        const announcer = document.getElementById('announcer');

        function setupGame() {
            board = Array(size * size).fill(0);
            score = 0;
            scoreSpan.innerText = score;
            addTile();
            addTile();
            renderBoard();
            announce("Hra zahájena. Máte dvě čísla na ploše.");
        }

        function addTile() {
            let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length > 0) {
                let idx = empty[Math.floor(Math.random() * empty.length)];
                board[idx] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function renderBoard() {
            boardDiv.innerHTML = '';
            board.forEach((val, i) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (val > 0) {
                    tile.innerText = val;
                    tile.setAttribute('data-value', val);
                }
                boardDiv.appendChild(tile);
            });
        }

        function announce(text) {
            announcer.innerText = text;
        }

        function move(direction) {
            let hasChanged = false;
            let mergedPoints = 0;

            // Logika pohybu (zjednodušená pro jeden směr)
            // 0: nahoru, 1: doprava, 2: dolů, 3: doleva
            
            function getLine(i, isRow) {
                let line = [];
                for (let j = 0; j < size; j++) {
                    line.push(board[isRow ? (i * size + j) : (j * size + i)]);
                }
                return line;
            }

            function setLine(i, isRow, line) {
                for (let j = 0; j < size; j++) {
                    board[isRow ? (i * size + j) : (j * size + i)] = line[j];
                }
            }

            function slide(line) {
                let arr = line.filter(v => v !== 0);
                for (let i = 0; i < arr.length - 1; i++) {
                    if (arr[i] === arr[i+1]) {
                        arr[i] *= 2;
                        mergedPoints += arr[i];
                        arr.splice(i+1, 1);
                        hasChanged = true;
                    }
                }
                while (arr.length < size) arr.push(0);
                return arr;
            }

            for (let i = 0; i < size; i++) {
                let isRow = direction === 1 || direction === 3;
                let line = getLine(i, isRow);
                if (direction === 1 || direction === 2) line.reverse();
                
                let newLine = slide(line);
                
                if (direction === 1 || direction === 2) newLine.reverse();
                if (JSON.stringify(line) !== JSON.stringify(newLine)) hasChanged = true;
                setLine(i, isRow, newLine);
            }

            if (hasChanged) {
                addTile();
                score += mergedPoints;
                scoreSpan.innerText = score;
                renderBoard();
                
                let dirText = ["Nahoru", "Doprava", "Dolů", "Doleva"][direction];
                let msg = dirText;
                if (mergedPoints > 0) msg += `. Spojeno! Skóre ${score}`;
                announce(msg);
            }
        }

        // Ovládání klávesnicí
        boardDiv.addEventListener('keydown', (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
                e.preventDefault(); // Zabrání scrollování stránky
                if (e.key === "ArrowUp") move(0);
                if (e.key === "ArrowRight") move(1);
                if (e.key === "ArrowDown") move(2);
                if (e.key === "ArrowLeft") move(3);
            }
        });

        setupGame();
    </script>
</body>
</html>
